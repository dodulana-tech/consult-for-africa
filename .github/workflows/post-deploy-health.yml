# Post-deploy health check.
#
# Triggers a few minutes after every push to main and probes
# https://www.consultforafrica.com/api/health. If the response is anything
# other than 200, the workflow fails and (with notification settings on)
# emails the repo admin.
#
# This is the third layer of the env-misconfiguration guard:
#   1. lib/env.ts validates at server boot via instrumentation.ts.
#   2. /api/health surfaces the same checks at runtime for any caller.
#   3. This workflow probes /api/health automatically after deploy so a
#      missing env never bleeds 24 hours of silent 500s again.
#
# To probe a different URL (preview deploys, staging), override the
# HEALTHCHECK_URL repository secret or variable.

name: Post-deploy health

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel to finish deploying
        run: sleep 90

      - name: Probe /api/health
        env:
          HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL || 'https://www.consultforafrica.com/api/health' }}
        run: |
          set -e
          echo "Probing $HEALTHCHECK_URL ..."
          response=$(curl --silent --show-error --max-time 30 --write-out '\n%{http_code}' "$HEALTHCHECK_URL")
          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n1)
          echo "HTTP $status"
          echo "$body" | head -c 4000
          echo
          if [ "$status" != "200" ]; then
            echo "::error::/api/health returned $status. Deploy is unhealthy."
            exit 1
          fi
          echo "Health check passed."
