# fly.toml app configuration file generated for consult-for-africa on 2026-05-05T18:29:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'consult-for-africa'
primary_region = 'jnb'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
